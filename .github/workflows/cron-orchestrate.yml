name: Cron - Orchestrate

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Call orchestrate endpoint
        run: |
          curl -s -f -X POST "${{ secrets.PRODUCTION_URL }}/api/cron/orchestrate" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

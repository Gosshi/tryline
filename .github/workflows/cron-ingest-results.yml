name: Cron - Ingest Results

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Call ingest-results endpoint
        run: |
          curl -s -f -X POST "${{ secrets.PRODUCTION_URL }}/api/cron/ingest-results" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

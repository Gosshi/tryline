name: Cron - Ingest Fixtures

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Call ingest-fixtures endpoint
        run: |
          curl -s -f -X POST "${{ secrets.PRODUCTION_URL }}/api/cron/ingest-fixtures" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
